<div class="grid grid-upload-overview">
  <div class="card">
    <div class="card-title">Upload CSV File</div>
    <form id="upload-form" action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">
      <div class="upload-dropzone" id="dropzone">
        <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
        <p><strong>Drag &amp; Drop</strong> your CSV file here</p>
        <p>or</p>
        <input type="file" name="csv_file" id="csv_file_input" accept=".csv" hidden>
        <button type="button" class="upload-choose-btn" onclick="document.getElementById('csv_file_input').click();">
          Choose CSV File
        </button>
        <p id="chosen-file-name" style="margin-top:10px;font-size:11.5px;"></p>
      </div>
    </form>
  </div>

  <div class="card empty-state">
    <i class="fa-solid fa-chart-column"></i>
    <h3>No dataset loaded yet</h3>
    <p>Upload a CSV file to see instant statistics, charts, correlations and a downloadable PDF report.</p>
    {% if recent %}
      <div style="text-align:left;margin-top:22px;">
        <div class="section-title" style="margin-top:0;">Recent uploads</div>
        {% for d in recent %}
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:13px;">{{ d.original_filename }}</span>
            <a href="{{ url_for('switch_dataset', dataset_id=d.id) }}" class="btn-primary" style="padding:6px 12px;font-size:11.5px;">Use this</a>
          </div>
        {% endfor %}
      </div>
    {% endif %}
  </div>
</div>
